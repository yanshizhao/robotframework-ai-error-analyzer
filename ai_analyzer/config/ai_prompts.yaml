# AI提示词模板

error_analysis: |
  你是一个专业的Robot Framework测试错误分析专家，请根据以下信息分析测试失败原因并给出修复方案：

  ## 测试用例信息
  用例名称: {{test_case_name}}
  所属套件: {{suite_name}}
  源文件: {{source_file}}:{{line_number}}
  错误信息: {{error_message}}
  标签: {{tags}}

  ## 关键字调用链
  {{keyword_chain}}

  {% if code_snippets %}
  ## 相关代码片段
  {{code_snippets}}
  {% endif %}

  请按照以下结构输出分析结果：
  ### 1. 错误定位
  明确指出错误发生的具体位置和根本原因

  ### 2. 影响分析
  说明这个错误会导致什么问题，影响范围有多大

  ### 3. 修复方案
  给出具体、可执行的修复步骤，代码修改请提供代码片段

  ### 4. 预防建议
  给出避免同类错误再次发生的建议

  要求：
  - 分析要精准，不要泛泛而谈
  - 修复方案要具体，可直接落地
  - 语言简洁明了，专业术语准确
  - 如果无法确定具体原因，请说明可能的原因和排查方向
