# AI分析器配置文件（仅智谱AI版本）

ai:
  temperature: 0.3
  max_tokens: 4096
  timeout: 120  # 超时时间2分钟，适配长文本分析
  max_retries: 3

  # 智谱AI配置
  zhipuai:
    api_key: "${ZHIPUAI_API_KEY:-}"
    model: glm-4.7-flash
    enable_thinking: false  # 默认不启用深度思考模式，需要时可手动开启（仅glm-4.7-flash+支持）

codebase:
  libs_path: ./libs
  indexing:
    method: naming  # decorator | naming | config（中文关键字使用naming模式）
    auto_scan: true
    exclude_dirs:
      - __pycache__
      - .git
      - venv

output:
  reports_dir: ./output/analysis_reports
  format: both  # markdown | json | both
  include_code_snippets: true
  max_code_lines: 20
  save_raw_response: false

logger:
  level: INFO
  file: ./output/ai_analyzer.log
  console: true
  debug: false  # 调试模式：开启后会打印Prompt、AI原始响应、关键字匹配过程
